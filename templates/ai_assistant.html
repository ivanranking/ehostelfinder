{% extends "base.html" %}

{% block title %}AI Assistant - EHostelFinder{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-200px)] flex items-center justify-center py-12">
  <div class="w-full max-w-2xl mx-auto px-4">
    <div class="bg-[var(--card)] rounded-2xl border border-[var(--border)] p-8 shadow-xl">
      <div class="text-center mb-8">
        <div class="w-16 h-16 rounded-full bg-gradient-to-br from-[var(--accent)] to-emerald-500 flex items-center justify-center mx-auto mb-4">
          <svg class="w-8 h-8 text-[var(--bg)]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
          </svg>
        </div>
        <h1 class="text-3xl font-['Space_Grotesk'] font-bold mb-2">eHostel AI Assistant</h1>
        <p class="text-[var(--muted)]">Ask questions about hostel services, bookings, and amenities</p>
      </div>

      <div class="space-y-4">
        <div class="relative">
          <textarea 
            id="question"
            placeholder="Type your question here... (e.g., 'What are the check-in hours?')"
            class="w-full min-h-[120px] p-4 bg-[var(--bg)] border border-[var(--border)] rounded-xl text-[var(--fg)] resize-none focus:border-[var(--accent)] focus:ring-2 focus:ring-[var(--accent)]/20 transition-all"
            onkeypress="handleKeyPress(event)"
          ></textarea>
        </div>

        <button onclick="askAI()" class="w-full btn-primary py-4 text-lg flex items-center justify-center gap-2">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
          </svg>
          <span>Send Message</span>
        </button>

        <div id="response" class="hidden">
          <div class="mt-6 p-6 bg-[var(--bg)] rounded-xl border border-[var(--border)] min-h-[100px]">
            <div id="response-content"></div>
          </div>
        </div>
      </div>

      <!-- Quick Questions -->
      <div class="mt-8 pt-6 border-t border-[var(--border)]">
        <p class="text-sm text-[var(--muted)] mb-3">Quick questions:</p>
        <div class="flex flex-wrap gap-2">
          <button onclick="setQuestion('What are the check-in and check-out times?')" class="px-4 py-2 bg-[var(--bg)] border border-[var(--border)] rounded-full text-sm hover:border-[var(--accent)] hover:text-[var(--accent)] transition-colors">
            Check-in/out times
          </button>
          <button onclick="setQuestion('How do I book a hostel?')" class="px-4 py-2 bg-[var(--bg)] border border-[var(--border)] rounded-full text-sm hover:border-[var(--accent)] hover:text-[var(--accent)] transition-colors">
            Booking process
          </button>
          <button onclick="setQuestion('What amenities are included?')" class="px-4 py-2 bg-[var(--bg)] border border-[var(--border)] rounded-full text-sm hover:border-[var(--accent)] hover:text-[var(--accent)] transition-colors">
            Amenities
          </button>
          <button onclick="setQuestion('Is there 24/7 security?')" class="px-4 py-2 bg-[var(--bg)] border border-[var(--border)] rounded-full text-sm hover:border-[var(--accent)] hover:text-[var(--accent)] transition-colors">
            Security
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Inline styles for AI page -->
<style>
  .typing-indicator {
    display: flex;
    gap: 8px;
    padding: 20px;
    justify-content: center;
    align-items: center;
  }

  .typing-indicator span {
    width: 10px;
    height: 10px;
    background: var(--accent);
    border-radius: 50%;
    animation: typing 1.4s infinite ease-in-out both;
  }

  .typing-indicator span:nth-child(1) { animation-delay: 0s; }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typing {
    0%, 80%, 100% { transform: scale(0); }
    40% { transform: scale(1); }
  }

  .error-message {
    color: #ef4444;
  }

  .error-message p {
    margin: 8px 0;
    font-size: 14px;
  }
</style>

<script>
function formatResponse(text) {
  if (!text) return '<p class="text-[var(--muted)]">No response generated.</p>';

  let formatted = String(text)
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>');

  if (!formatted.startsWith('<p>')) {
    formatted = '<p>' + formatted + '</p>';
  }

  return formatted;
}

async function askAI() {
  const question = document.getElementById("question").value;
  const responseBox = document.getElementById("response");
  const responseContent = document.getElementById("response-content");

  if (!question.trim()) {
    responseContent.innerHTML = "<p class='text-[var(--muted)]'>Please enter a question.</p>";
    responseBox.classList.remove('hidden');
    return;
  }

  responseBox.classList.remove('hidden');
  responseContent.innerHTML = "<div class='typing-indicator'><span></span><span></span><span></span></div>";

  try {
    const response = await fetch("/api/ai-chat/", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question })
    });

    let data = await response.json();
    if (!response.ok) {
      const errMessage = data.error || data.message || `Server returned ${response.status}`;
      throw new Error(errMessage);
    }
    let aiText = data.candidates?.[0]?.content?.parts?.[0]?.text || data.reply || 'Sorry, I could not generate a response.';
    responseContent.innerHTML = formatResponse(aiText);
  } catch (error) {
    console.error("AI Error:", error);
    responseContent.innerHTML = `
      <div class="error-message">
        <strong>Error</strong>
        <p>Sorry, we couldn't connect to the AI service.</p>
        <p><small>${error.message}</small></p>
      </div>
    `;
  }
}
</script>
{% endblock %}
