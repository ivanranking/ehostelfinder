{% extends "base.html" %}

{% block title %}Password Reset - EHostelFinder{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-80px)] flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md text-center">
        <div class="bg-[var(--card)] rounded-3xl border border-[var(--border)] p-8 sm:p-10">
            {% if status == 'invalid' %}
                <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-red-500 to-pink-500 flex items-center justify-center mx-auto mb-4">
                    <svg class="w-8 h-8 text-[var(--bg)]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </div>
                <h1 class="text-2xl font-['Space_Grotesk'] font-bold mb-4 text-red-500">Invalid Link</h1>
            {% elif status == 'expired' %}
                <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-amber-500 to-orange-500 flex items-center justify-center mx-auto mb-4">
                    <svg class="w-8 h-8 text-[var(--bg)]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                </div>
                <h1 class="text-2xl font-['Space_Grotesk'] font-bold mb-4 text-amber-500">Link Expired</h1>
            {% elif status == 'used' %}
                <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-blue-500 to-cyan-500 flex items-center justify-center mx-auto mb-4">
                    <svg class="w-8 h-8 text-[var(--bg)]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                    </svg>
                </div>
                <h1 class="text-2xl font-['Space_Grotesk'] font-bold mb-4 text-blue-500">Already Used</h1>
            {% endif %}

            <p class="text-[var(--muted)] mb-6">{{ message }}</p>

            <a href="/login/" class="btn-primary inline-block">Back to Login</a>
        </div>
    </div>
</div>

<style>
    .btn-primary {
        background: var(--accent);
        color: var(--bg);
        font-weight: 600;
        padding: 12px 24px;
        border-radius: 8px;
        transition: all 0.2s ease;
        border: none;
        cursor: pointer;
    }
    .btn-primary:hover {
        background: var(--accent-hover);
    }
</style>
{% endblock %}
