{% extends 'base.html' %}

{% block title %}Upload Hostel - EHostelFinder{% endblock %}

{% block content %}
<div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="mb-8">
        <h1 class="text-3xl font-bold font-['Space_Grotesk'] mb-2">Upload a Hostel</h1>
        <p class="text-[var(--muted)]">Add the hostel details you want to show on the website.</p>
    </div>

    <form method="post" class="bg-[var(--card)] border border-[var(--border)] rounded-xl p-6 space-y-6">
        {% csrf_token %}
        <div class="grid sm:grid-cols-2 gap-4">
            <div>
                <label class="text-sm text-[var(--muted)]">Name</label>
                <input name="name" required class="w-full mt-1 rounded-lg border border-[var(--border)] bg-[var(--bg)] px-3 py-2" />
            </div>
            <div>
                <label class="text-sm text-[var(--muted)]">Address</label>
                <input name="address" required class="w-full mt-1 rounded-lg border border-[var(--border)] bg-[var(--bg)] px-3 py-2" />
            </div>
            <div>
                <label class="text-sm text-[var(--muted)]">City</label>
                <input name="city" required class="w-full mt-1 rounded-lg border border-[var(--border)] bg-[var(--bg)] px-3 py-2" />
            </div>
            <div>
                <label class="text-sm text-[var(--muted)]">Country</label>
                <input name="country" value="Uganda" class="w-full mt-1 rounded-lg border border-[var(--border)] bg-[var(--bg)] px-3 py-2" />
            </div>
            <div>
                <label class="text-sm text-[var(--muted)]">University</label>
                <input name="university" class="w-full mt-1 rounded-lg border border-[var(--border)] bg-[var(--bg)] px-3 py-2" />
            </div>
            <div>
                <label class="text-sm text-[var(--muted)]">Single Price</label>
                <input type="number" step="0.01" name="price_single" class="w-full mt-1 rounded-lg border border-[var(--border)] bg-[var(--bg)] px-3 py-2" />
            </div>
            <div>
                <label class="text-sm text-[var(--muted)]">Double Price</label>
                <input type="number" step="0.01" name="price_double" class="w-full mt-1 rounded-lg border border-[var(--border)] bg-[var(--bg)] px-3 py-2" />
            </div>
            <div>
                <label class="text-sm text-[var(--muted)]">Triple Price</label>
                <input type="number" step="0.01" name="price_triple" class="w-full mt-1 rounded-lg border border-[var(--border)] bg-[var(--bg)] px-3 py-2" />
            </div>
            <div>
                <label class="text-sm text-[var(--muted)]">Quadruple Price</label>
                <input type="number" step="0.01" name="price_quadruple" class="w-full mt-1 rounded-lg border border-[var(--border)] bg-[var(--bg)] px-3 py-2" />
            </div>
            <div>
                <label class="text-sm text-[var(--muted)]">Rating</label>
                <input type="number" step="0.1" min="0" max="5" name="rating" class="w-full mt-1 rounded-lg border border-[var(--border)] bg-[var(--bg)] px-3 py-2" />
            </div>
            <div>
                <label class="text-sm text-[var(--muted)]">Amenities</label>
                <input name="amenities" placeholder="Wi-Fi, Breakfast" class="w-full mt-1 rounded-lg border border-[var(--border)] bg-[var(--bg)] px-3 py-2" />
            </div>
            <div>
                <label class="text-sm text-[var(--muted)]">Image URL</label>
                <input type="url" name="image_url" class="w-full mt-1 rounded-lg border border-[var(--border)] bg-[var(--bg)] px-3 py-2" />
            </div>
            <div>
                <label class="text-sm text-[var(--muted)]">Room Availability</label>
                <div class="mt-2 flex flex-col gap-2">
                    <label class="flex items-center gap-2 text-sm"><input type="checkbox" name="room_available_single" checked class="w-4 h-4 text-[var(--accent)]"> Single room available</label>
                    <label class="flex items-center gap-2 text-sm"><input type="checkbox" name="room_available_double" checked class="w-4 h-4 text-[var(--accent)]"> Double room available</label>
                    <label class="flex items-center gap-2 text-sm"><input type="checkbox" name="room_available_triple" checked class="w-4 h-4 text-[var(--accent)]"> Triple room available</label>
                    <label class="flex items-center gap-2 text-sm"><input type="checkbox" name="room_available_quadruple" checked class="w-4 h-4 text-[var(--accent)]"> Quadruple room available</label>
                </div>
            </div>
        </div>
        <div>
            <label class="text-sm text-[var(--muted)]">Description</label>
            <textarea name="description" rows="4" class="w-full mt-1 rounded-lg border border-[var(--border)] bg-[var(--bg)] px-3 py-2"></textarea>
        </div>
        <button type="submit" class="btn-primary w-full">Create Hostel</button>
    </form>
</div>
{% endblock %}
