     EHOSTEL AI CHATBOT - INTEGRATION SNIPPET
     ============================================
     
     Copy this entire block and paste it just before 
     the closing </body> tag on your website pages.
     
     This will add the floating AI chatbot widget that
     appears in the bottom-right corner of the screen.
   -->

<!-- eHostel AI Chatbot Integration -->
<script>
!function(){
  // Create and load chatbot widget script
  const script = document.createElement('script');
  script.src = 'ehostelfinder/ehostel%20ai/chatbot-widget.js';
  script.async = true;
  script.onload = function() {
    console.log('✅ eHostel AI Chatbot loaded successfully');
  };
  script.onerror = function() {
    console.error('❌ Failed to load eHostel AI Chatbot');
  };
  document.head.appendChild(script);
}();
</script>
