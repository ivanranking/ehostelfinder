<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eHostel AI Assistant</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="chat-container">
  <h1>🤖 eHostel AI Assistant</h1>
  
  <p style="text-align: center; color: #666; margin-bottom: 20px;">
    Ask questions about hostel services, bookings, and amenities
  </p>

  <textarea 
    id="question" 
    placeholder="Type your question here... (e.g., 'What are the check-in hours?')"
    onkeypress="handleKeyPress(event)"
  ></textarea>

  <button onclick="askAI()">
    <span>Send Message</span>
  </button>

  <div id="response"></div>
</div>

<script src="script.js"></script>
</body>
</html>
